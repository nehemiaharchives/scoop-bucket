name: 📦 bbl Bucket Request
description: Request a bbl-related Scoop manifest or install behavior change.
title: "[Request]: "
labels: ["package-request"]
body:
- type: checkboxes
  attributes:
    label: Prerequisites
    options:
    - label: I have searched all issues/PRs to ensure it has not already been reported or fixed.
      required: true
- type: checkboxes
  attributes:
    label: Criteria
    description: Requests for this bucket should be related to bbl and installable through Scoop.
    options:
    - label: The request is for bbl, an official bbl release asset, or a companion asset used by bbl.
      required: true
    - label: The requested asset is published by nehemiaharchives or another trusted upstream.
      required: true
    - label: The requested behavior can be implemented in a Scoop manifest or bucket script.
      required: true
- type: input
  attributes:
    label: Name
    description: Name of the package
  validations:
    required: true
- type: input
  attributes:
    label: Description
    description: Clear and concise details of what it is
  validations:
    required: true
- type: input
  attributes:
    label: Homepage
    description: URI of the package's homepage
  validations:
    required: true
- type: input
  attributes:
    label: Download Link(s)
    description: URI(s) of the package's download(s)
  validations:
    required: true
- type: textarea
  attributes:
    label: Some Indication of Popularity/Repute
    description: GitHub stars/software reviews etc.
  validations:
    required: true
